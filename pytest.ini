[pytest]
# Pytest configuration for Music Analysis Platform

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 7.0

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (with database/API)
    e2e: End-to-end tests (complete workflows)
    bdd: BDD tests (Gherkin scenarios)
    slow: Slow running tests
    skip_ci: Tests to skip in CI/CD

# Coverage options
[coverage:run]
source = apps
omit =
    */tests/*
    */migrations/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
